<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealtimeSub — 비밀번호 재설정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 36px;
    }

    .label {
      color: #888;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 14px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      padding: 14px 48px 14px 16px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #2563eb; }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #555;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: #888; }

    .hint {
      font-size: 12px;
      color: #555;
      margin-top: -8px;
      margin-bottom: 14px;
    }

    .submit-btn {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error   { background: #2a0f0f; border: 1px solid #7f1d1d; color: #fca5a5; }
    .msg.success { background: #0f2a1a; border: 1px solid #14532d; color: #86efac; }
    .msg.show    { display: block; }

    .state-icon {
      text-align: center;
      font-size: 48px;
      margin-bottom: 16px;
    }

    .success-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-body {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    .back-btn {
      display: block;
      text-align: center;
      color: #2563eb;
      font-size: 14px;
      font-weight: 600;
      margin-top: 28px;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #expired-view, #success-view { display: none; }
  </style>
</head>
<body>

<div class="card">

  <!-- ── 만료됨 ──────────────────────────────── -->
  <div id="expired-view">
    <div class="state-icon">⏱</div>
    <div class="success-title" style="color:#fca5a5;">링크가 만료되었어요</div>
    <p class="success-body">비밀번호 재설정 링크의 유효 시간이 지났어요.<br>앱에서 다시 요청해 주세요.</p>
  </div>

  <!-- ── 완료 ───────────────────────────────── -->
  <div id="success-view">
    <div class="state-icon">✅</div>
    <div class="success-title">비밀번호 변경 완료!</div>
    <p class="success-body">새 비밀번호로 설정되었어요.<br>앱으로 돌아가서 로그인해 주세요.</p>
  </div>

  <!-- ── 메인 폼 ─────────────────────────────── -->
  <div id="form-view">
    <div class="logo">RealtimeSub</div>
    <div class="subtitle">새 비밀번호를 설정해 주세요</div>

    <div id="error-msg"  class="msg error"></div>
    <div id="success-msg" class="msg success"></div>

    <div class="label">새 비밀번호</div>
    <div class="input-wrapper">
      <input type="password" id="pw1" placeholder="6자 이상 입력" autocomplete="new-password" />
      <button class="eye-btn" onclick="toggleEye('pw1', 'eye1')" id="eye1">👁</button>
    </div>
    <p class="hint">최소 6자 이상</p>

    <div class="label">비밀번호 확인</div>
    <div class="input-wrapper">
      <input type="password" id="pw2" placeholder="동일하게 다시 입력" autocomplete="new-password" />
      <button class="eye-btn" onclick="toggleEye('pw2', 'eye2')" id="eye2">👁</button>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
      비밀번호 변경
    </button>
  </div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDiXeQrde_steX1Ssa2Vj4xrN2-q4dwnW4",
    authDomain: "realtimesub-a7dcc.firebaseapp.com",
    projectId: "realtimesub-a7dcc",
  };
  firebase.initializeApp(firebaseConfig);

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  const oobCode = getParam("oobCode");
  const mode    = getParam("mode");

  if (mode !== "resetPassword" || !oobCode) {
    document.getElementById("form-view").style.display = "none";
    document.getElementById("expired-view").style.display = "block";
  } else {
    firebase.auth().verifyPasswordResetCode(oobCode)
      .catch(() => {
        document.getElementById("form-view").style.display = "none";
        document.getElementById("expired-view").style.display = "block";
      });
  }

  function toggleEye(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    if (input.type === "password") {
      input.type = "text";
      btn.textContent = "🔒";
    } else {
      input.type = "password";
      btn.textContent = "👁";
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.classList.add("show");
    document.getElementById("success-msg").classList.remove("show");
  }

  function handleSubmit() {
    const pw1 = document.getElementById("pw1").value;
    const pw2 = document.getElementById("pw2").value;
    const btn = document.getElementById("submit-btn");

    document.getElementById("error-msg").classList.remove("show");

    if (pw1.length < 6) { showError("비밀번호는 최소 6자 이상이어야 해요."); return; }
    if (pw1 !== pw2)    { showError("비밀번호가 일치하지 않아요."); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    firebase.auth().confirmPasswordReset(oobCode, pw1)
      .then(() => {
        document.getElementById("form-view").style.display    = "none";
        document.getElementById("success-view").style.display = "block";
      })
      .catch((e) => {
        btn.disabled = false;
        btn.textContent = "비밀번호 변경";
        if (e.code === "auth/expired-action-code" || e.code === "auth/invalid-action-code") {
          document.getElementById("form-view").style.display    = "none";
          document.getElementById("expired-view").style.display = "block";
        } else {
          showError("오류가 발생했어요. 다시 시도해 주세요.");
        }
      });
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleSubmit();
  });
</script>

</body>
</html>
